name: "🛢️ Oil & Gas Job Search — Tue & Fri"

on:
  schedule:
    - cron: "0 7 * * 2,5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install
        run: pip install requests beautifulsoup4 lxml ddgs

      - name: Search + Email + Telegram
        env:
          EMAIL_PROVIDER:    ${{ secrets.EMAIL_PROVIDER }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:        ${{ secrets.FROM_EMAIL }}
          FROM_NAME:         ${{ secrets.FROM_NAME }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python runner.py

      - name: Save DB
        if: always()
        run: |
          git config user.name "Oil & Gas Job Bot"
          git config user.email "bot@oilgas-jobs.local"
          git add jobs.db
          git diff --cached --quiet || git commit -m "📊 Update job database [skip ci]"
          git push
        continue-on-error: true