# =============================================================================
# Render.com deployment — Free Telegram Bot hosting
# 1. Push this repo to GitHub
# 2. Go to https://render.com → New → Web Service
# 3. Connect your GitHub repo
# 4. Set:
#    - Name: oil-gas-job-bot
#    - Runtime: Python 3
#    - Build Command: pip install requests beautifulsoup4 lxml
#    - Start Command: python bot.py
#    - Instance Type: Free
# =============================================================================

services:
  - type: web
    name: oil-gas-job-bot
    env: python
    buildCommand: pip install requests beautifulsoup4 lxml
    startCommand: python bot.py
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_APP_PASS
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: SERPAPI_KEY
        sync: false
